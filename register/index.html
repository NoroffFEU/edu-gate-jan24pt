<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register | Edugate</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />  </head>
  <body>
    <header>
      <div class="desktop-header">
        <a href="../index.html"><img src="/assets/images/logo_header.png" /></a>
        <ul class="navbar">
          <a href=""><li>About</li></a>
          <a href=""><li>Contact</li></a>
        </ul>
      </div>
      <div class="mobile-header">
        <div class="header-top">
          <a href="index.html"
            ><img src="/assets/images/mobile_logo.png"
          /></a>
          <img
            src="/assets/icons/nav/menu.png"
            class="open-menu"
            id="open-menu"
          />
          <img
            src="/assets/icons/general/close_menu.png"
            class="close-menu"
            id="close-menu"
          />
        </div>
        <div class="header-bottom">
          <ul>
            <li><a href="/login/index.html">Login</a></li>
            <li><a href="/sign_up/index.html">Signup</a></li>
            <li><a href="">About</a></li>
            <li><a href="">Contact</a></li>
          </ul>
          <ul class="list-icons">
            <li><img src="/assets/icons/general/login.png" /></li>
            <li><img src="/assets/icons/general/signup.png" /></li>
            <li><img src="/assets/icons/nav/about.png" /></li>
            <li><img src="/assets/icons/nav/contact.png" /></li>
          </ul>
        </div>
      </div>

    </header>
   
  <div class="register-container">
    <div class="form-box">
      <h1>Register</h1>
      <form>
        <div class="form-group">
          <label for="school">School</label>
          <input type="text" id="school" value="Edugate" />
        </div>
 
        <div class="form-group">
          <label for="address1">Address line 1</label>
          <input type="text" id="address1" placeholder="Address" />
        </div>
 
        <div class="form-group">
          <label for="address2">Address line 2</label>
          <input type="text" id="address2" placeholder="Address" />
        </div>
 
        <div class="form-row">
          <div class="form-group">
            <label for="city">City</label>
            <input type="text" id="city" value="Oslo" />
          </div>
 
          <div class="form-group">
            <label for="postal">Postal Code</label>
            <input type="text" id="postal" value="0000" />
          </div>
        </div>
 
        <button class="submit-btn" type="submit">Submit</button>
      </form>

      
      
    </div>
  </div>
  <footer>
    <img
      src="/assets/images/footer_circles.svg"
      alt="Edugate footer circles"
      class="mobile-footer-img"
    />
    <img
      src="/assets/images/footer_circles.svg"
      alt="Edugate footer circles"
      class="footer-img"
    />
  </footer>
  <script src="register.js"></script>
  </body>
</html>
