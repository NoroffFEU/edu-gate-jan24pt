<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/css/dashboard/teacher/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Teacher dashboard</title>
  </head>

  <body>
    <div class="wrapper">
      <!-- Header -->
      <header>
        <div class="desktop-header">
          <div class="logo">
            <a href="index.html"
              ><img src="/assets/images/logo_header.png" alt="Edugate logo."
            /></a>
          </div>
          <ul class="navbar" aria-label="Desktop navigation">
            <a href=""><li class="active">Dashboard</li></a>
            <a href=""><li>About</li></a>
            <a href=""><li>Contact</li></a>
          </ul>
          <a href="" class="header-profile">
            <img src="../../assets/icons/socials/profile_icon.png" />
          </a>
        </div>
        <div class="mobile-header">
          <a href="index.html"
            ><img src="../../assets/images/mobile_logo.png"
          /></a>
          <img
            src="../../assets/icons/nav/menu.png"
            class="open-menu"
            id="open-menu"
            aria-label="Open menu."
          />
        </div>
        <img
          src="/assets/icons/general/close_menu.png"
          class="close-menu"
          id="close-menu"
          aria-label="Close menu."
        />
        <div class="mobile-menu">
          <nav class="links" aria-label="Mobile navigation">
            <ul class="link-text">
              <li><a href="#">Dashboard</a></li>
              <li><a href="">Profile</a></li>
              <li><a href="">About</a></li>
              <li><a href="">Contact</a></li>
            </ul>
            <ul class="link-icons">
              <li><img src="../../assets/icons/nav/home.png" /></li>
              <li><img src="../../assets/icons/socials/profile_icon.png" /></li>
              <li><img src="../../assets/icons/nav/about.png" /></li>
              <li><img src="../../assets/icons/nav/contact.png" /></li>
            </ul>
          </nav>
          <div class="logout-link">
            <a href="../../index.html">Logout</a>
            <img src="../../assets/icons/general/sign_out.png" />
          </div>
        </div>
      </header>

      <main>
        <section class="teacher-dashboard-section">
          <h1>Dashboard</h1>
          <div class="avatar">JB</div>
          <div class="name">Joe Bloggs</div>
          <div class="subtitle">Teacher at Edugate school</div>

          <div class="teacher-actions">
            <div class="main-actions">
              <a href="#" class="action-item">
                <img
                  src="/assets/icons/general/top_students.png"
                  alt="top_students"
                />
                Top students
              </a>
              <a href="#" class="action-item">
                <img
                  src="/assets/icons/general/add_results.png"
                  alt="add_results"
                />
                Add results
              </a>
              <a href="#" class="action-item">
                <img
                  src="/assets/icons/general/view_results.png"
                  alt="view_results"
                />
                View results
              </a>
            </div>

            <div class="user-actions">
              <a href="#" class="action-item">
                <img
                  src="/assets/icons/socials/profile_icon.png"
                  alt="profile"
                />
                See profile
              </a>
              <a href="#" class="action-item">
                <img src="/assets/icons/general/sign_out.png" alt="logout" />
                Log out
              </a>
            </div>
          </div>
        </section>
      </main>

      <footer>
        <img
          src="/assets/images/footer_circles.svg"
          alt="Edugate footer circles"
          class="footer-img"
        />
        <img
          src="/assets/images/footer_circles.svg"
          alt="Edugate footer circles"
          class="mobile-footer-img"
        />
      </footer>
    </div>

    <script type="module" src="../../src/header.mjs"></script>
  </body>
</html>
