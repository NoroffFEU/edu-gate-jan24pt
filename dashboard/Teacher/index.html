<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/css/dashboard/teacher/styles.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>Teacher dashboard</title>
  </head>

  <body>

    <aside class="fixed-sidebar" id="fixedSidebar">
        <nav>
          <ul>
            <li><img src="/assets/icons/nav/home.png" alt="Home" /></li>
            <li><img src="/assets/icons/general/view_results.png" alt="view_results" /></li>
            <li><img src="/assets/icons/general/manage_users.png" alt="manage_users" /></li>
            <li><img src="/assets/icons/general/top_students.png" alt="top_students"/></li>
            <li><img src="/assets/icons/general/sign_out.png" alt="sign_out" /></li>
          </ul>
        </nav>

          <div class="close-fixedSidebar hideOnDesktop" onclick="hideFixedSidebar()">
            <i class="fa-solid fa-xmark"></i>
          </div>
    </aside>
    <div class="open-fixedSidebar hideOnDesktop" id="open-fixedSidebar" onclick="toggleFixedSidebar()">
        <i class="fa-solid fa-angles-right"></i>
      </div>
    
      
    <div class="wrapper">
    <header>
      <nav class="nav-items">
        <div class="logo-header">
          <img src="/assets/images/logo_header.png" class="logo-desktop" alt="Logo">
          <img src="/assets/images/mobile_logo.png" class="logo-mobile" alt="mobile_logo">
        </div>
        <a href="#" class="hideOnMobile active">Dashboard</a>
        <a href="#" class="hideOnMobile">About</a>
        <a href="#" class="hideOnMobile">Contact</a>
        <a href="#" class="hideOnMobile">
          <img src="/assets/icons/socials/profile_icon.png" alt="profile-icon" class="profile-icon">
        </a>
        <div class="menu-icon" onclick="showSidebar()">
          <img src="/assets/icons/nav/menu.png" alt="menu">
        </div>
      </nav>
  
      <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <img src="/assets/images/mobile_logo.png" alt="Logo" class="sidebar-logo">
          <div class="sidebar-close" onclick="hideSidebar()">
            <i class="fa-solid fa-xmark"></i>
          </div>
        </div>

        <div class="sidebar-links">
          <a href="#" class="active">
            <span>Dashboard</span>
            <img src="/assets/icons/nav/home.png" alt="Home">
          </a>
          <a href="#">
            <span>Profile</span>
            <img src="/assets/icons/socials/profile_icon.png" alt="Profile">
          </a>
          <a href="#">
            <span>About</span>
            <img src="/assets/icons/nav/about.png" alt="About">
          </a>
          <a href="#">
            <span>Contact</span>
            <img src="/assets/icons/nav/contact.png" alt="Contact">
          </a>
        </div>
  
        <div class="sidebar-divider"></div>
        
        <a href="#" class="logout">
          <span>Log out</span>
          <img src="/assets/icons/general/sign_out.png" alt="Logout">
        </a>
      </div>
    </header>

  <main>
  <section class="teacher-dashboard-section">
    <h1>Dashboard</h1>
    <div class="avatar">JB</div>
    <div class="name">Joe Bloggs</div>
    <div class="subtitle">Teacher at Edugate school</div>

    <div class="teacher-actions">
        <div class="main-actions">
          <a href="#" class="action-item">
            <img src="/assets/icons/general/top_students.png" alt="top_students">
            Top students
          </a>
          <a href="#" class="action-item">
            <img src="/assets/icons/general/add_results.png" alt="add_results">
            Add results
          </a>
          <a href="#" class="action-item">
            <img src="/assets/icons/general/view_results.png" alt="view_results">
            View results
          </a>
        </div>
        
        <div class="user-actions">
          <a href="#" class="action-item">
            <img src="/assets/icons/socials/profile_icon.png" alt="profile">
            See profile
          </a>
          <a href="#" class="action-item">
            <img src="/assets/icons/general/sign_out.png" alt="logout">
            Log out
          </a>
        </div>
      </div>

  </section>
  </main>
  
  <footer>
    <img src="/assets/images/footer_circles.svg" alt="Edugate footer circles" class="footer-img"/>
    <img src="/assets/images/footer_circles.svg" alt="Edugate footer circles" class="mobile-footer-img"/>
  </footer>
  </div>
  <script src="teacher.js"></script>

</body>
</html>
