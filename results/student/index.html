<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Your Results – Edugate</title>
  <link rel="stylesheet" href="styling.css">
</head>
<body>

  <!-- HEADER -->
  <header>
    <nav class="nav-bar">
      <a href="/dashboard.html" class="logo"><img src="/assets/images/logo_header.png" alt="Edugate logo"></a>
      <ul class="nav-desktop">
        <li><a href="/dashboard.html">Dashboard</a></li>
        <li><a href="/about.html">About</a></li>
        <li><a href="/contact.html">Contact</a></li>
      </ul>
      <img class="profile-icon" src="/assets/icons/socials/profile_icon.png" alt="Profile">
      <button class="hamburger" aria-label="Open menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </nav>

    <!-- MOBILE PANEL -->
    <div class="nav-mobile" aria-hidden="true">
      <div class="mobile-header">
        <a href="/dashboard.html"><img src="/assets/images/logo_header.png" alt="Edugate logo"></a>
        <button class="mobile-close" aria-label="Close menu">✕</button>
      </div>
      <ul>
        <li><a href="/dashboard.html"><img src="/assets/icons/nav/home.png" alt="" aria-hidden="true">Dashboard</a></li>
        <li><a href="/profile.html"><img src="/assets/icons/socials/profile_icon.png" alt="" aria-hidden="true">Profile</a></li>
        <li><a href="/about.html"><img src="/assets/icons/nav/about.png" alt="" aria-hidden="true">About</a></li>
        <li><a href="/contact.html"><img src="/assets/icons/nav/contact.png" alt="" aria-hidden="true">Contact</a></li>
        <li class="logout"><a href="/logout.html"><img src="/assets/icons/general/sign_out.png" alt="" aria-hidden="true">Log out</a></li>
      </ul>
    </div>
  </header>

  <!-- MAIN -->
  <main>
    <nav class="breadcrumbs" aria-label="Breadcrumb">
      <a href="/dashboard.html">Dashboard</a><span>Your results</span>
    </nav>

    <h1>Your Results</h1>
    <img class="view-icon" src="/assets/icons/general/view_results.png" alt="" aria-hidden="true">
    <p class="subtitle">View your results</p>

    <div class="search-wrap">
      <input id="searchInput" type="search" placeholder="Search for results…" aria-label="Search results">
      <button id="searchBtn" aria-label="Search">
        <img src="/assets/icons/general/search.svg" alt="">
      </button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Year</th><th>Term</th><th>Subject</th><th>Exam</th><th>Result</th><th>Grade</th>
          </tr>
        </thead>
        <tbody id="resultsBody"></tbody>
      </table>
    </div>

    <div id="pagination" class="pagination"></div>
    <a href="/dashboard.html" class="btn-back">Back to dashboard</a>
  </main>

  <!-- FOOTER -->
  <footer>
  </footer>

  <!-- INFO OVERLAY -->
  <div id="infoOverlay" class="info-overlay" aria-hidden="true">
    <div class="info-dialog" role="dialog" aria-modal="true">
      <button class="info-close" aria-label="Close details">✕</button>
      <div class="info-grid">
        <div><h4>Year</h4><p id="infoYear"></p></div>
        <div><h4>Term</h4><p id="infoTerm"></p></div>
        <div><h4>Subject</h4><p id="infoSubject"></p></div>
        <div><h4>Exam</h4><p id="infoExam"></p></div>
        <div><h4>Result</h4><p id="infoResult"></p></div>
        <div><h4>Grade</h4><p id="infoGrade"></p></div>
      </div>
    </div>
  </div>


  <!-- JAVASCRIPT -->
  <script>
  (function(){
    // --- dummy data (50 entries for 8 pages @7/page) ---
    const DATA = Array.from({length:50}, (_,i)=>({
      year: 2019 + (i%3),
      term: 1 + (i%3),
      subject: ['Mathematics','Physics','English','Biology','History'][i%5],
      exam: ['M1','P2','E3'][i%3],
      result: `${80+(i%41)}/120`,
      grade: ['A','B','C'][i%3]
    }));
    const PAGE_SIZE = 7;
    let filtered = [...DATA], currentPage = 1;

    // render table rows + info-buttons
    function renderTable(page=1){
      currentPage = page;
      const start = (page-1)*PAGE_SIZE;
      const slice = filtered.slice(start, start+PAGE_SIZE);
      const tbody = document.getElementById('resultsBody');
      tbody.innerHTML = '';
      slice.forEach((r,idx)=>{
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${r.year}</td>
          <td>${r.term}</td>
          <td>${r.subject}</td>
          <td>${r.exam}</td>
          <td>${r.result}</td>
          <td>
            ${r.grade}
            <button class="info-btn"
                    data-index="${start+idx}"
                    aria-label="View details">i</button>
          </td>`;
        tbody.appendChild(tr);
      });
      renderPagination();
    }

    // pagination controls
    function renderPagination(){
      const total = Math.ceil(filtered.length/PAGE_SIZE);
      const wrap = document.getElementById('pagination');
      wrap.innerHTML = '';
      function btn(label, p, disabled){
        const b = document.createElement('button');
        b.textContent = label;
        if(disabled) b.disabled = true;
        else b.addEventListener('click',()=>renderTable(p));
        if(p===currentPage) b.classList.add('active');
        return b;
      }
      wrap.appendChild(btn('«',1, currentPage===1));
      wrap.appendChild(btn('‹',currentPage-1, currentPage===1));
      wrap.appendChild(btn('1',1,false));
      if(total>2){
        const sp = document.createElement('span');
        sp.className='ellipsis';
        sp.textContent='…';
        wrap.appendChild(sp);
        wrap.appendChild(btn(total,total,false));
      }
      wrap.appendChild(btn('›',currentPage+1, currentPage===total));
      wrap.appendChild(btn('»',total,      currentPage===total));
    }

    // live search
    document.getElementById('searchInput')
      .addEventListener('input', e=>{
        const q = e.target.value.toLowerCase();
        filtered = DATA.filter(r=>
          `${r.year} ${r.term} ${r.subject} ${r.exam} ${r.result} ${r.grade}`
            .toLowerCase().includes(q)
        );
        renderTable(1);
      });
    // also search on click icon
    document.getElementById('searchBtn')
      .addEventListener('click', ()=> document.getElementById('searchInput').dispatchEvent(new Event('input')));

    // info-overlay open/close
    const overlay = document.getElementById('infoOverlay');
    overlay.setAttribute('aria-hidden','true');
    document.body.addEventListener('click', e=>{
      if(e.target.matches('.info-btn')){
        const idx = +e.target.dataset.index;
        const r = filtered[idx];
        ['Year','Term','Subject','Exam','Result','Grade']
          .forEach(key=>{
            document.getElementById('info'+key).textContent = r[key.toLowerCase()];
          });
        overlay.classList.add('open');
        overlay.setAttribute('aria-hidden','false');
      }
      if(e.target.matches('.info-close') || e.target===overlay){
        overlay.classList.remove('open');
        overlay.setAttribute('aria-hidden','true');
      }
    });

    // mobile menu toggle
    const hamb = document.querySelector('.hamburger');
    const navMob = document.querySelector('.nav-mobile');
    const mClose = document.querySelector('.mobile-close');
    function toggleMenu(){
      const open = hamb.getAttribute('aria-expanded')==='true';
      hamb.setAttribute('aria-expanded', String(!open));
      navMob.classList.toggle('open');
      navMob.setAttribute('aria-hidden', open);
    }
    hamb.addEventListener('click', toggleMenu);
    mClose.addEventListener('click', toggleMenu);

    // kick off
    renderTable();
  })();
  </script>

</body>
</html>
