<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!--
    Edugate “Your Results” page
    Note: The real API endpoint (/api/v1/results) is included for a future experiment,
    but it will not work during this project. We’ll fall back to `fallbackResults` dummy data.
  -->

  <!-- Google Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600&family=Roboto:wght@400;500&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/basics.css">
  <link rel="stylesheet" href="/css/styles.css">

  <title>Your results – Edugate</title>
</head>

<body>
  <!-- ===================================================================
       HEADER
       Site logo, main nav links, and mobile hamburger toggle
  ==================================================================== -->
  <header>
    <nav>
      <!-- Logo linking back to home -->
      <a href="/templates/index.html">
        <img src="/assets/images/logo_header.png" alt="Edugate logo">
      </a>

      <!-- Hamburger button for mobile menu toggle -->
      <button class="hamburger" aria-label="Toggle menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>

      <!-- Primary navigation links -->
      <ul class="nav-links">
        <li><a href="/templates/dashboard.html">Dashboard</a></li>
        <li><a href="/templates/about.html">About</a></li>
        <li><a href="/templates/contact.html">Contact</a></li>
      </ul>

      <!-- User profile icon (placeholder) -->
      <img class="user-icon"
           src="/assets/icons/socials/profile_icon.png"
           alt="Profile"
           width="40"
           height="40"
           loading="lazy">
    </nav>
  </header>

  <!-- ===================================================================
       MAIN CONTENT
       Breadcrumbs, page title, search/filter controls, and results table
  ==================================================================== -->
  <main class="results-page">

    <!-- Breadcrumb navigation for context -->
    <nav aria-label="Breadcrumb" class="breadcrumbs">
      <a href="/templates/dashboard.html">Dashboard</a>
      <span>Your results</span>
    </nav>

    <!-- Page header -->
    <h1 class="page-title">Your Results</h1>
    <p class="page-subtitle">View your results</p>

    <!-- Search input -->
    <div class="results-search-wrapper">
      <input type="search"
             id="resultSearch"
             placeholder="Search for results…"
             aria-label="Search results">
      <button id="searchBtn" aria-label="Search">
        <!-- Inline SVG for search icon -->
        <svg width="18" height="18" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
      </button>
    </div>

    <!-- Filter controls -->
    <div class="results-filter-wrapper">
      <select id="semesterFilter" aria-label="Filter by semester">
        <option value="">All semesters</option>
        <option value="1">Term&nbsp;1</option>
        <option value="2">Term&nbsp;2</option>
        <option value="3">Term&nbsp;3</option>
      </select>

      <select id="subjectFilter" aria-label="Filter by subject">
        <option value="">All subjects</option>
        <option value="Mathematics">Mathematics</option>
        <option value="Physics">Physics</option>
        <option value="English">English</option>
        <option value="Biology">Biology</option>
        <option value="History">History</option>
      </select>
    </div>

    <!-- Results table -->
    <div class="table-wrapper">
      <table class="results-table">
        <thead>
          <tr>
            <th>Year</th>
            <th>Term</th>
            <th>Subject</th>
            <th>Exam</th>
            <th>Result</th>
            <th>Grade</th>
          </tr>
        </thead>
        <tbody id="resultsBody">
          <!-- Table rows will be injected by JavaScript -->
        </tbody>
      </table>
    </div>

    <!-- Pagination controls (populated by JS) -->
    <div class="pagination" id="pagination"></div>

    <!-- Back to dashboard button -->
    <p style="text-align:center; margin-top: var(--space-5);">
      <a href="/templates/dashboard.html" class="btn-secondary">
        Back to dashboard
      </a>
    </p>
  </main>

  <!-- ===================================================================
       FOOTER
       Decorative SVG (no interactive content)
  ==================================================================== -->
  <footer class="footer">
    <img src="/assets/images/footer_circles.svg"
         class="footer-circles"
         alt=""
         aria-hidden="true">
  </footer>

  <!-- ===================================================================
       JAVASCRIPT
       Data fetching, rendering, and UI hooks
  ==================================================================== -->
  <script>
    /**
     * Helper: Create an element with attributes and children.
     * Usage: el('tag', { id: 'foo', onClick: handler }, child1, child2, ...)
     */
    function el(tag, attrs = {}, ...children) {
      const node = document.createElement(tag);
      for (const [key, value] of Object.entries(attrs)) {
        if (key.startsWith('on')) {
          node.addEventListener(key.slice(2).toLowerCase(), value);
        } else {
          node.setAttribute(key, value);
        }
      }
      node.append(...children);
      return node;
    }

    /** 
     * Dummy data to use while the real API is not available.
     * Replace with live fetch to /api/v1/results when ready.
     */
    const fallbackResults = [
      { year: 2019, term: 3, subject: 'Mathematics', exam: 'M1', score: 90, total: 120, grade: 'B' },
      { year: 2019, term: 3, subject: 'Physics',     exam: 'P3', score: 102, total: 120, grade: 'A' },
      { year: 2019, term: 3, subject: 'English',     exam: 'E2', score: 80,  total: 110, grade: 'B' },
      { year: 2019, term: 2, subject: 'English',     exam: 'E1', score: 95,  total: 130, grade: 'B' },
      { year: 2019, term: 3, subject: 'Biology',     exam: 'B2', score: 73,  total: 120, grade: 'C' },
      { year: 2019, term: 2, subject: 'Physics',     exam: 'P2', score: 110, total: 120, grade: 'A' },
      { year: 2019, term: 1, subject: 'History',     exam: 'H2', score: 90,  total: 110, grade: 'A' }
    ];

    // Number of results per page
    const PAGE_SIZE = 7;

    /**
     * Fetch results from API, falling back to dummy data on error.
     * @returns {Promise<Array>}
     */
    async function loadResults() {
      try {
        const res = await fetch('/api/v1/results');
        if (!res.ok) throw new Error('Network response was not ok');
        const data = await res.json();
        return (Array.isArray(data) && data.length) ? data : fallbackResults;
      } catch (err) {
        console.warn('Using fallback data:', err);
        return fallbackResults;
      }
    }

    /**
     * Render a specific page of the results table.
     * @param {Array} data - full results array
     * @param {number} page - 1-based page index
     */
    function renderTablePage(data, page = 1) {
      const tbody = document.getElementById('resultsBody');
      tbody.innerHTML = ''; // clear previous rows

      // Determine slice for current page
      const start = (page - 1) * PAGE_SIZE;
      const end = page * PAGE_SIZE;
      const pageItems = data.slice(start, end);

      // Append rows
      pageItems.forEach(item => {
        const row = el('tr', {},
          el('td', {}, item.year),
          el('td', {}, item.term),
          el('td', {}, item.subject),
          el('td', {}, item.exam),
          el('td', {}, `${item.score}/${item.total}`),
          el('td', {}, item.grade)
        );
        tbody.append(row);
      });

      // Update pagination controls
      renderPagination(data.length, page);
    }

    /**
     * Render pagination buttons based on total results.
     * @param {number} totalItems
     * @param {number} currentPage
     */
    function renderPagination(totalItems, currentPage) {
      const totalPages = Math.ceil(totalItems / PAGE_SIZE);
      const paginationEl = document.getElementById('pagination');
      paginationEl.innerHTML = '';

      // Helper to create nav buttons
      const addBtn = (label, page, disabled = false) => {
        paginationEl.append(
          el('button',
            {
              class: disabled ? 'disabled' : '',
              ...(disabled ? {} : { onClick: () => renderTablePage(window.__ALL_RESULTS, page) })
            },
            label
          )
        );
      };

      // First and previous
      addBtn('«', 1, currentPage === 1);
      addBtn('‹', currentPage - 1, currentPage === 1);

      // Numbered pages
      for (let p = 1; p <= totalPages; p++) {
        paginationEl.append(
          el('button',
            {
              class: p === currentPage ? 'active' : '',
              onClick: () => renderTablePage(window.__ALL_RESULTS, p)
            },
            p
          )
        );
      }

      // Next and last
      addBtn('›', currentPage + 1, currentPage === totalPages);
      addBtn('»', totalPages, currentPage === totalPages);
    }

    /**
     * Wire up live search input to filter table rows.
     * @param {Array} data - full results array
     */
    function hookSearch(data) {
      document.getElementById('resultSearch')
        .addEventListener('input', e => {
          const query = e.target.value.toLowerCase();
          const filtered = data.filter(item =>
            Object.values(item).some(val => String(val).toLowerCase().includes(query))
          );
          renderTablePage(filtered, 1);
        });
    }

    /**
     * Hook semester and subject dropdowns to filter results.
     * @param {Array} data - full results array
     */
    function hookFilters(data) {
      const semFilter = document.getElementById('semesterFilter');
      const subFilter = document.getElementById('subjectFilter');

      const applyFilters = () => {
        const filtered = data.filter(item =>
          (!semFilter.value || String(item.term) === semFilter.value) &&
          (!subFilter.value || item.subject === subFilter.value)
        );
        renderTablePage(filtered, 1);
      };

      semFilter.addEventListener('change', applyFilters);
      subFilter.addEventListener('change', applyFilters);
    }

    // Initialize: load data, render first page, and set up UI hooks
    loadResults().then(data => {
      window.__ALL_RESULTS = data;
      renderTablePage(data, 1);
      hookSearch(data);
      hookFilters(data);
    });

    // Mobile nav toggle behavior
    document.querySelector('.hamburger')?.addEventListener('click', e => {
      const btn = e.currentTarget;
      const navLinks = document.querySelector('.nav-links');
      const expanded = btn.getAttribute('aria-expanded') === 'true';
      btn.setAttribute('aria-expanded', String(!expanded));
      navLinks.classList.toggle('open');
    });
  </script>
</body>

</html>
