<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Your Results – Edugate</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="styling.css">
</head>

<body>
  
  <!-- Header -->
    <header>
      <div class="desktop-header">
        <div class="logo"><a href="index.html"><img src="/assets/images/logo_header.png" alt="Edugate logo."/></a></div>
        <ul class="navbar" aria-label="Desktop navigation">
          <a href=""><li>Dashboard</li></a>
          <a href=""><li>About</li></a>
          <a href=""><li>Contact</li></a>
        </ul>
        <a href="" class="header-profile">
          <img src="../../assets/icons/socials/profile_icon.png" />
        </a>
      </div>
      <div class="mobile-header">
        <a href="index.html"
          ><img src="../../assets/images/mobile_logo.png"
        /></a>
        <img
          src="../../assets/icons/nav/menu.png"
          class="open-menu"
          id="open-menu"
          aria-label="Open menu."
        />
      </div>
      <img
        src="/assets/icons/general/close_menu.png"
        class="close-menu"
        id="close-menu"
        aria-label="Close menu."
      />
      <div class="mobile-menu">
        <nav class="links" aria-label="Mobile navigation">
          <ul class="link-text">
            <li><a href="#">Dashboard</a></li>
            <li><a href="">Profile</a></li>
            <li><a href="">About</a></li>
            <li><a href="">Contact</a></li>
          </ul>
          <ul class="link-icons">
            <li><img src="../../assets/icons/nav/home.png" /></li>
            <li><img src="../../assets/icons/socials/profile_icon.png" /></li>
            <li><img src="../../assets/icons/nav/about.png" /></li>
            <li><img src="../../assets/icons/nav/contact.png" /></li>
          </ul>
        </nav>
        <div class="logout-link">
          <a href="../../index.html">Logout</a>
          <img src="../../assets/icons/general/sign_out.png" />
        </div>
      </div>
    </header>

  <!-- Main content area: breadcrumbs, page title, search box, and results table -->
  <main>
    <nav class="breadcrumbs" aria-label="Breadcrumb">
      <a href="/dashboard.html">Dashboard</a><span>Your results</span>
    </nav>

    <h1>Your Results</h1>
    <img class="view-icon" src="/assets/icons/general/view_results.png" alt="" aria-hidden="true">
    <p class="subtitle">View your results</p>

    <div class="search-wrap">
      <input id="searchInput" type="search" placeholder="Search for results…" aria-label="Search results">
      <button id="searchBtn" aria-label="Search">
        <img src="/assets/icons/general/search.svg" alt="">
      </button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Year</th>
            <th>Term</th>
            <th>Subject</th>
            <th>Exam</th>
            <th>Result</th>
            <th>Grade</th>
          </tr>
        </thead>
        <tbody id="resultsBody"></tbody>
      </table>
    </div>

    <div id="pagination" class="pagination"></div>
    <a href="/dashboard.html" class="btn-back">Back to dashboard</a>
  </main>

  <!-- Empty footer for future content or links -->
  <footer>
      <img
        src="../../assets/images/footer_circles.svg"
        alt="Edugate footer circles"
        class="mobile-footer-img"
      />
      <img
        src="../../assets/images/footer_circles.svg"
        alt="Edugate footer circles"
        class="footer-img"
      />
    </footer>

  <!-- Overlay dialog for viewing detailed info about a single result entry -->
  <div id="infoOverlay" class="info-overlay" aria-hidden="true">
    <div class="info-dialog" role="dialog" aria-modal="true">
      <button class="info-close" aria-label="Close details">✕</button>
      <div class="info-grid">
        <div>
          <h4>Year</h4>
          <p id="infoYear"></p>
        </div>
        <div>
          <h4>Term</h4>
          <p id="infoTerm"></p>
        </div>
        <div>
          <h4>Subject</h4>
          <p id="infoSubject"></p>
        </div>
        <div>
          <h4>Exam</h4>
          <p id="infoExam"></p>
        </div>
        <div>
          <h4>Result</h4>
          <p id="infoResult"></p>
        </div>
        <div>
          <h4>Grade</h4>
          <p id="infoGrade"></p>
        </div>
      </div>
    </div>
  </div>

  <!-- JavaScript to power the dummy results table, search, pagination, overlay, and mobile menu -->
  <script>
    (function () {
      // Generate 50 mock results to simulate what we'll get from the API later
      const DATA = Array.from({ length: 50 }, (_, i) => ({
        year: 2019 + (i % 3),                        // cycles through 2019, 2020, 2021
        term: 1 + (i % 3),                           // cycles through terms 1, 2, 3
        subject: ['Mathematics', 'Physics', 'English', 'Biology', 'History'][i % 5],
        exam: ['M1', 'P2', 'E3'][i % 3],             // picks one of three exam codes
        result: `${80 + (i % 41)}/120`,              // makes a score between 80 and 120
        grade: ['A', 'B', 'C'][i % 3]                // cycles through grades A, B, C
      }));
      const PAGE_SIZE = 7;
      let filtered = [...DATA];
      let currentPage = 1;

      // Renders one page of results into the table body
      function renderTable(page = 1) {
        currentPage = page;
        const start = (page - 1) * PAGE_SIZE;
        const slice = filtered.slice(start, start + PAGE_SIZE);
        const tbody = document.getElementById('resultsBody');
        tbody.innerHTML = '';

        slice.forEach((r, idx) => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${r.year}</td>
            <td>${r.term}</td>
            <td>${r.subject}</td>
            <td>${r.exam}</td>
            <td>${r.result}</td>
            <td>
              ${r.grade}
              <button class="info-btn"
                      data-index="${start + idx}"
                      aria-label="View details">i</button>
            </td>`;
          tbody.appendChild(tr);
        });

        renderPagination();
      }

      // Builds and displays the pagination buttons based on total pages
      function renderPagination() {
        const total = Math.ceil(filtered.length / PAGE_SIZE);
        const wrap = document.getElementById('pagination');
        wrap.innerHTML = '';

        const btn = (label, page, disabled, icon) => {
          const b = document.createElement('button');
          if (icon) {
            b.innerHTML = `<img src="${icon}" alt="${label}">`;
          } else {
            b.textContent = label;
          }
          // Only disable if it's a nav button and should be disabled
          if (disabled) {
            b.disabled = true;
          } else {
            b.addEventListener('click', () => renderTable(page));
          }
          // Style as active if this is the current page (but don't disable)
          if (/^\d+$/.test(label) && page === currentPage) {
            b.classList.add('active');
            // DO NOT disable the active page button!
          }
          return b;
        };
        const ellipsis = () => {
          const span = document.createElement('span');
          span.className = 'ellipsis';
          span.textContent = '…';
          return span;
        };

        if (window.innerWidth <= 480) {
          wrap.appendChild(btn('«', 1, currentPage === 1, '/assets/icons/general/first.svg'));
          wrap.appendChild(btn('‹', Math.max(1, currentPage - 1), currentPage === 1, '/assets/icons/general/left.svg'));
          // ACTIVE PAGE BUTTON: do NOT disable!
          wrap.appendChild(btn(String(currentPage), currentPage, false));
          if (total > 2) wrap.appendChild(ellipsis());
          if (total > 1) wrap.appendChild(btn(String(total), total, false));
          wrap.appendChild(btn('»', total, currentPage === total, '/assets/icons/general/last.svg'));
          return;
        }

        wrap.appendChild(btn('«', 1, currentPage === 1, '/assets/icons/general/first.svg'));
        wrap.appendChild(btn('‹', Math.max(1, currentPage - 1), currentPage === 1, '/assets/icons/general/left.svg'));

        let pagesToShow = [];
        if (currentPage < total - 2) {
          pagesToShow = [currentPage, currentPage + 1];
        } else {
          pagesToShow = [total - 1, total];
        }
        pagesToShow = pagesToShow.filter(p => p >= 1 && p <= total);

        pagesToShow.forEach(p => wrap.appendChild(btn(String(p), p, false)));

        if (currentPage < total - 2) {
          wrap.appendChild(ellipsis());
          wrap.appendChild(btn(String(total - 1), total - 1, currentPage === total - 1));
          wrap.appendChild(btn(String(total), total, currentPage === total));
        }

        wrap.appendChild(btn('›', Math.min(total, currentPage + 1), currentPage === total, '/assets/icons/general/right.svg'));
        wrap.appendChild(btn('»', total, currentPage === total, '/assets/icons/general/last.svg'));
      }

      document.getElementById('searchInput')
        .addEventListener('input', e => {
          const query = e.target.value.toLowerCase();
          filtered = DATA.filter(r =>
            `${r.year} ${r.term} ${r.subject} ${r.exam} ${r.result} ${r.grade}`
              .toLowerCase().includes(query)
          );
          renderTable(1);
        });

      document.getElementById('searchBtn')
        .addEventListener('click', () => {
          const inputEvent = new Event('input');
          document.getElementById('searchInput').dispatchEvent(inputEvent);
        });

      const overlay = document.getElementById('infoOverlay');
      overlay.setAttribute('aria-hidden', 'true');
      document.body.addEventListener('click', e => {
        if (e.target.matches('.info-btn')) {
          const idx = +e.target.dataset.index;
          const r = filtered[idx];
          ['Year', 'Term', 'Subject', 'Exam', 'Result', 'Grade']
            .forEach(key => {
              document.getElementById('info' + key).textContent = r[key.toLowerCase()];
            });
          overlay.classList.add('open');
          overlay.setAttribute('aria-hidden', 'false');
        }
        if (e.target.matches('.info-close') || e.target === overlay) {
          overlay.classList.remove('open');
          overlay.setAttribute('aria-hidden', 'true');
        }
      });

      renderTable();
      window.addEventListener('resize', renderPagination);
    })();
  </script>
<script type="module" src="../../src/header.mjs"></script>
</body>
</html>
<!--
  This HTML file is a complete, self-contained page for displaying student results.
  It includes a responsive navigation bar, search functionality, pagination, and an overlay
  for viewing detailed result information. The JavaScript at the bottom generates mock data
  and handles all interactivity.
