<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edugate - Sign Up</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="site-header">
            <div class="site-logo">
                <img src="../assets/images/logo_header.png" alt="Edugate School Logo">
            </div>
            <nav class="main-nav">
                <ul>
                    <li class="main-nav-item"><a href="#about" class="main-nav-link"><strong>About</strong></a></li>
                    <li class="main-nav-item"><a href="#contact" class="main-nav-link"><strong>Contact</strong></a></li>
                </ul>
            </nav>
        </header>

        <main class="main-content">
            <div class="signup-container">
                <h1 class="page-title">Sign up</h1>
                <form class="signup-form">
                    <div class="form-group">
                        <label for="email" class="form-label form-label-required">Email</label>
                        <input type="email" id="email" name="email" class="form-input" placeholder="example@mail.com">
                        <span class="error-message" id="email-error"></span>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="firstname" class="form-label form-label-required">First name</label>
                            <input type="text" id="firstname" name="firstname" class="form-input" placeholder="Ola">
                            <span class="error-message" id="firstname-error"></span>
                        </div>
                        <div class="form-group">
                            <label for="surname" class="form-label form-label-required">Surname</label>
                            <input type="text" id="surname" name="surname" class="form-input" placeholder="Nordmann">
                            <span class="error-message" id="surname-error"></span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password" class="form-label form-label-required">Password</label>
                        <input type="password" id="password" name="password" class="form-input" placeholder="Choose password">
                        <span class="error-message" id="password-error"></span>
                    </div>

                    <div class="form-group">
                        <label for="confirm-password" class="form-label form-label-required">Confirm password</label>
                        <input type="password" id="confirm-password" name="confirm-password" class="form-input" placeholder="Repeat password">
                        <span class="error-message" id="confirm-password-error"></span>
                    </div>

                    <button type="submit" class="submit-btn">Submit</button>
                </form>
            </div>

            <div class="notification">
                <div class="notification-content">
                    <div class="notification-icon">
                        <img src="../assets/icons/general/error.png" alt="Error">
                    </div>
                    <div class="notification-text">
                        <h3 class="notification-heading">Failed Sign Up!</h3>
                        <p class="notification-message">Wrong password or email address!</p>
                    </div>
                    <button class="notification-close">×</button>
                </div>
            </div>
        </main>

        <div class="decorative-shapes">
            <img src="../assets/images/footer_circles.svg" alt="Decorative circles" class="footer-circles">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
