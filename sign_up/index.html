<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edugate - Sign Up</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Header -->
    <header>
      <div class="desktop-header">
        <div class="logo">
          <a href="index.html"
            ><img src="/assets/images/logo_header.png" alt="Edugate logo."
          /></a>
        </div>
        <ul class="navbar" aria-label="Desktop navigation">
          <a href=""><li>About</li></a>
          <a href=""><li>Contact</li></a>
        </ul>
      </div>
      <div class="mobile-header">
        <a href="index.html"
          ><img src="../../assets/images/mobile_logo.png"
        /></a>
        <img
          src="../../assets/icons/nav/menu.png"
          class="open-menu"
          id="open-menu"
          aria-label="Open menu."
        />
      </div>
      <img
        src="/assets/icons/general/close_menu.png"
        class="close-menu"
        id="close-menu"
        aria-label="Close menu."
      />
      <div class="mobile-menu">
        <nav class="links" aria-label="Mobile navigation">
          <ul class="link-text">
            <li><a href="../login/index.html">Login</a></li>
            <li><a href="../sign_up/index.html">Signup</a></li>
            <li><a href="">About</a></li>
            <li><a href="">Contact</a></li>
          </ul>
          <ul class="link-icons">
            <li><img src="../../assets/icons/general/login.png" /></li>
            <li><img src="../../assets/icons/general/signup.png" /></li>
            <li><img src="../../assets/icons/nav/about.png" /></li>
            <li><img src="../../assets/icons/nav/contact.png" /></li>
          </ul>
        </nav>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
      <div class="signup-container">
        <h1 class="page-title">Sign up</h1>
        <form class="signup-form">
          <div class="form-group">
            <label for="email" class="form-label">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              class="form-input"
              placeholder="example@mail.com"
            />
            <span class="error-message" id="email-error"></span>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="firstname" class="form-label">First name</label>
              <input
                type="text"
                id="firstname"
                name="firstname"
                class="form-input"
                placeholder="Ola"
              />
              <span class="error-message" id="firstname-error"></span>
            </div>
            <div class="form-group">
              <label for="surname" class="form-label">Surname</label>
              <input
                type="text"
                id="surname"
                name="surname"
                class="form-input"
                placeholder="Nordmann"
              />
              <span class="error-message" id="surname-error"></span>
            </div>
          </div>
          <div class="form-group">
            <label for="password" class="form-label">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              class="form-input"
              placeholder="Choose password"
            />
            <span class="error-message" id="password-error"></span>
          </div>
          <div class="form-group">
            <label for="confirm-password" class="form-label"
              >Confirm password</label
            >
            <input
              type="password"
              id="confirm-password"
              name="confirm-password"
              class="form-input"
              placeholder="Repeat password"
            />
            <span class="error-message" id="confirm-password-error"></span>
          </div>
          <button type="submit" class="submit-btn">Submit</button>
        </form>
      </div>
    </main>

    <!-- Notification Popup -->
    <div class="notification">
      <button class="notification-close" aria-label="Close notification">
        ×
      </button>
      <div class="notification-content">
        <div class="notification-icon">
          <img src="../assets/icons/general/error.png" alt="Error" />
        </div>
        <div class="notification-text">
          <h3 class="notification-heading">Failed Sign Up!</h3>
          <p class="notification-message">Wrong password or email address!</p>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer>
      <img
        src="../../assets/images/footer_circles.svg"
        alt="Edugate footer circles"
        class="mobile-footer-img"
      />
      <img
        src="../../assets/images/footer_circles.svg"
        alt="Edugate footer circles"
        class="footer-img"
      />
    </footer>
    <script type="module" src="script.js"></script>
  </body>
</html>
