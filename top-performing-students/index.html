<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Top Performing Students | Edugate</title>
    <link rel="stylesheet" href="../css/styles.css" />
    <link rel="stylesheet" href="/css/sidebar-menu/sidebar-menu.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Header / Navigation -->
    <header>
      <div class="desktop-header">
        <div class="logo">
          <a href="index.html"
            ><img src="/assets/images/logo_header.png" alt="Edugate logo."
          /></a>
        </div>
        <ul class="navbar" aria-label="Desktop navigation">
          <a href=""><li>Dashboard</li></a>
          <a href=""><li>About</li></a>
          <a href=""><li>Contact</li></a>
        </ul>
      </div>
      <div class="mobile-header">
        <a href="index.html"><img src="/assets/images/mobile_logo.png" /></a>
        <img
          src="/assets/icons/nav/menu.png"
          class="open-menu"
          id="open-menu"
          aria-label="Open menu."
        />
      </div>
      <img
        src="/assets/icons/general/close_menu.png"
        class="close-menu"
        id="close-menu"
        aria-label="Close menu."
      />
      <div class="mobile-menu">
        <nav class="links" aria-label="Mobile navigation">
          <ul class="link-text">
            <li><a href="#">Dashboard</a></li>
            <li><a href="">Profile</a></li>
            <li><a href="">About</a></li>
            <li><a href="">Contact</a></li>
          </ul>
          <ul class="link-icons">
            <li><img src="../../assets/icons/nav/home.png" /></li>
            <li><img src="../../assets/icons/socials/profile_icon.png" /></li>
            <li><img src="../../assets/icons/nav/about.png" /></li>
            <li><img src="../../assets/icons/nav/contact.png" /></li>
          </ul>
        </nav>
        <div class="logout-link">
          <a href="../../index.html">Logout</a>
          <img src="../../assets/icons/general/sign_out.png" />
        </div>
      </div>
    </header>

    <div class="dashboard-container">
      <button class="sidebar-toggle" aria-label="Toggle Sidebar">☰</button>
      <aside class="sidebar">
        <nav>
          <ul>
            <li>
              <a href="#">
                <i class="icon"
                  ><img src="/assets/icons/nav/home.png" alt="home"
                /></i>
                <span class="link-text">Home</span>
              </a>
            </li>
            <li>
              <a href="#">
                <i class="icon"
                  ><img
                    src="/assets/icons/general/view_results.png"
                    alt="view results"
                /></i>
                <span class="link-text">Results management</span>
              </a>
            </li>
            <li>
              <a href="#">
                <i class="icon"
                  ><img
                    src="/assets/icons/general/manage_users.png"
                    alt="manage users"
                /></i>
                <span class="link-text">User management</span>
              </a>
            </li>
            <li>
              <a href="#">
                <i class="icon"
                  ><img
                    src="/assets/icons/general/top_students.png"
                    alt="top students"
                /></i>
                <span class="link-text">School management</span>
              </a>
            </li>
            <li class="logout">
              <a href="#">
                <i class="icon"
                  ><img src="/assets/icons/general/sign_out.png" alt="sign out"
                /></i>
                <span class="link-text">Logout</span>
              </a>
            </li>
          </ul>
        </nav>
      </aside>

      <!-- Main Content -->
      <main class="container">
        <h1>Top Performing Students</h1>
        <!-- Table or content goes here later -->
      </main>
    </div>

    <!-- Footer -->
    <footer>
      <img
        src="../assets/images/footer_circles.svg"
        alt="Edugate footer circles"
        class="mobile-footer-img"
      />
      <img
        src="../assets/images/footer_circles.svg"
        alt="Edugate footer circles"
        class="footer-img"
      />
    </footer>

    <!-- Temporary Mobile Menu JavaScript -->
    <script type="module" src="../src/header.mjs"></script>

    <script>
      const toggleButton = document.querySelector('.sidebar-toggle');
      const sidebar = document.querySelector('.sidebar');

      toggleButton.addEventListener('click', () => {
        sidebar.classList.toggle('show');
      });
    </script>
  </body>
</html>
