<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/landing-page/landingpage.css" />
    <title>Landing page Edugate</title>
  </head>
  <body>
    <!-- Header -->
    <header>
      <div class="desktop-header">
        <div class="logo">
          <a href="index.html"
            ><img src="/assets/images/logo_header.png" alt="Edugate logo."
          /></a>
        </div>
        <ul class="navbar" aria-label="Desktop navigation">
          <a href=""><li>About</li></a>
          <a href=""><li>Contact</li></a>
        </ul>
      </div>
      <div class="mobile-header">
        <a href="index.html"><img src="/assets/images/mobile_logo.png" /></a>
        <img
          src="/assets/icons/nav/menu.png"
          class="open-menu"
          id="open-menu"
          aria-label="Open menu."
        />
      </div>
      <img
        src="/assets/icons/general/close_menu.png"
        class="close-menu"
        id="close-menu"
        aria-label="Close menu."
      />
      <div class="mobile-menu">
        <nav class="links" aria-label="Mobile navigation">
          <ul class="link-text">
            <li><a href="/login/index.html">Login</a></li>
            <li><a href="/sign_up/index.html">Signup</a></li>
            <li><a href="">About</a></li>
            <li><a href="">Contact</a></li>
          </ul>
          <ul class="link-icons">
            <li><img src="/assets/icons/general/login.png" /></li>
            <li><img src="/assets/icons/general/signup.png" /></li>
            <li><img src="/assets/icons/nav/about.png" /></li>
            <li><img src="/assets/icons/nav/contact.png" /></li>
          </ul>
        </nav>
      </div>
    </header>

    <main>
      <section>
        <div class="landingpageimg">
          <h1>Edugate</h1>
          <p>
            Welcome to Edugate, the platform that lets you access your exam
            results online.
          </p>
          <div class="button-wrapper">
            <a href="/sign_up/index.html" id="signup" class="button">Sign Up</a>
            <a href="/login/index.html" id="login" class="button">Log In</a>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <img
        src="/assets/images/footer_circles.svg"
        alt="Edugate footer circles"
        class="mobile-footer-img"
      />
      <img
        src="/assets/images/footer_circles.svg"
        alt="Edugate footer circles"
        class="footer-img"
      />
    </footer>
    <script type="module" src="src/header.mjs"></script>
  </body>
</html>
